model:
  in_channels: 1
  out_channels: 4
  base_filters: 32
  depth: 5
  kernel_size: 3
  padding: 1
  learning_rate: 0.00015
dataset:
  batch_size: 8
  num_workers: 4
  val_split: 0.2
  data_file: ./data/mixer_256.npz
  max_samples: 0
  normalize: true
trainer:
  max_epochs: 80
  accelerator: auto
  log_every_n_steps: 10
  enable_checkpointing: false
callbacks:
  early_stopping:
    monitor: validation_loss
    patience: 10
    mode: min
experiment_name: mixer_256_fixed_dataset
