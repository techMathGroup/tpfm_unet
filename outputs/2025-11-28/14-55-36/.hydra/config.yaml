model:
  in_channels: 1
  out_channels: 4
  base_filters: 32
  depth: 5
  kernel_size: 3
  padding: 1
  learning_rate: 0.00015
dataset:
  batch_size: 16
  num_workers: 4
  val_split: 0.2
  data_file: ./data/mixer_128.npz
  max_samples: 0
  normalize: true
trainer:
  max_epochs: 20
  accelerator: auto
  log_every_n_steps: 10
callbacks:
  early_stopping:
    monitor: validation_loss
    patience: 10
    mode: min
experiment_name: mixer_128_fixed_dataset
